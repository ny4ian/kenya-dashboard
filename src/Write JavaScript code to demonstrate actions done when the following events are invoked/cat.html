<!DOCTYPE html>
<html>

<body>

    <script>

        var numbers = [700, 120, 330, 90, 190];


        var sum = 0;
        for (var i = 0; i < numbers.length; i++) {
            sum = sum + numbers[i];
        }


        alert("The sum of the five values is: " + sum);
    </script>

</body>

</html>
